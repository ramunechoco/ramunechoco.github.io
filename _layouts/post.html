---
layout: default
---
<article class="post">
  <h1 class="post-title">{{ page.title }}</h1>
  {% if page.subtitle %}<p class="post-subtitle">{{ page.subtitle }}</p>{% endif %}
  <p class="post-meta">{{ page.date | date: "%B %d, %Y" }}</p>
  <div class="post-content">
    {{ content }}
  </div>
</article>
